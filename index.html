<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1f2937">
<meta name="mobile-web-app-capable" content="yes">

    <title>DPD Navigator - Tournée 122</title>

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    >

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: Arial, sans-serif;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .panel {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;

            background: white;
            padding: 10px;

            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        select {
            font-size: 16px;
            padding: 6px;
        }

        .code {
            font-size: 18px;
            font-weight: bold;
            color: #c00000;
        }
    .tour-panel{position:absolute;top:70px;left:10px;z-index:1000;background:white;padding:10px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.3)}.done-btn,.reset-btn{margin-top:8px;padding:8px;border:0;border-radius:6px;font-weight:bold}.done-btn{background:#16a34a;color:white}.reset-btn{background:#dc2626;color:white}
.ocr-btn{margin-top:8px;padding:8px;border:0;border-radius:6px;font-weight:bold;background:#2563eb;color:white}
.ocr-modal{display:none;position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,.65);padding:12px;overflow:auto}
.ocr-box{background:white;border-radius:10px;padding:14px;max-width:650px;margin:auto}
.ocr-results{max-height:45vh;overflow:auto;margin:10px 0}
.ocr-ok{color:#15803d}.ocr-bad{color:#b91c1c}.ocr-row{padding:7px;border-bottom:1px solid #ddd}
</style>
</head>

<body>

<div class="panel">
    <select id="zoneSelect">
        <option value="all">Toutes les zones</option>
    </select>
</div>

<div class="tour-panel"><b>Tournée du jour</b><br><span id="tourStats">0 sélectionnée</span><br><button class="ocr-btn" onclick="document.getElementById('pdaPhotos').click()">📷 Importer photos PDA</button>
<input id="pdaPhotos" type="file" accept="image/*" capture="environment" multiple hidden onchange="importPdaPhotos(this.files)">
<br><button class="done-btn" onclick="startTour()">Démarrer la tournée</button> <button class="reset-btn" onclick="newTour()">Nouvelle tournée</button></div><div id="map"></div>
<div id="ocrModal" class="ocr-modal"><div class="ocr-box">
<b>Import de la tournée</b><div id="ocrStatus">Préparation...</div>
<div id="ocrResults" class="ocr-results"></div>
<button class="done-btn" onclick="validateOcrImport()">✓ Ajouter les adresses reconnues</button>
<button class="reset-btn" onclick="closeOcr()">Annuler</button>
</div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>

const map = L.map("map").setView([46.19, 6.14], 13);

L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    {
        maxZoom: 19,
        attribution: "© OpenStreetMap"
    }
).addTo(map);


const zoneColors = {
    1: "#e6194B",
    2: "#3cb44b",
    3: "#ffe119",
    4: "#4363d8",
    5: "#f58231",
    6: "#911eb4",
    7: "#46f0f0",
    8: "#f032e6",
    9: "#bcf60c",
    10: "#fabebe",
    11: "#008080",
    12: "#e6beff",
    13: "#9a6324"
};


let allData = [];

let markersLayer=L.layerGroup().addTo(map);
let selected=JSON.parse(localStorage.getItem("tournee122_selected")||"{}"),delivered=JSON.parse(localStorage.getItem("tournee122_delivered")||"{}"),tourStarted=localStorage.getItem("tournee122_started")==="1";
function pointId(p){return String(p.Zone)+"|"+p.Adresse}
function save(){localStorage.setItem("tournee122_selected",JSON.stringify(selected));localStorage.setItem("tournee122_delivered",JSON.stringify(delivered));}
function updateStats(){let pts=allData.filter(p=>selected[pointId(p)]),done=pts.filter(p=>delivered[pointId(p)]).length;document.getElementById("tourStats").textContent=tourStarted?`${pts.length} à livrer — ${done} livrées — ${pts.length-done} restantes`:`${pts.length} sélectionnées`;}
function toggleSelected(id){selected[id]=!selected[id];save();displayZone(document.getElementById("zoneSelect").value);updateStats();}
function toggleDelivered(id){delivered[id]=!delivered[id];save();displayZone(document.getElementById("zoneSelect").value);updateStats();}
function startTour(){if(!Object.values(selected).some(Boolean)){alert("Sélectionne d'abord les adresses du jour.");return;}tourStarted=true;localStorage.setItem("tournee122_started","1");displayZone(document.getElementById("zoneSelect").value);updateStats();}
function newTour(){if(confirm("Effacer la tournée du jour ?")){selected={};delivered={};tourStarted=false;localStorage.removeItem("tournee122_selected");localStorage.removeItem("tournee122_delivered");localStorage.removeItem("tournee122_started");displayZone(document.getElementById("zoneSelect").value);updateStats();}}



let ocrMatches=[];
let ocrRawTexts=[];

function normText(v){
 return String(v||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"")
 .toLowerCase().replace(/[^a-z0-9]+/g," ").replace(/\s+/g," ").trim();
}
function addressParts(addr){
 const n=normText(addr),m=n.match(/^(.*?)(?:\s+)(\d+\s*(?:bis|ter)?)$/);
 return m?{street:m[1].trim(),num:m[2].replace(/\s/g,"")}:{street:n,num:""};
}
function editSimilarity(a,b){
 a=normText(a);b=normText(b);if(!a||!b)return 0;if(a===b)return 1;
 const dp=Array.from({length:a.length+1},()=>Array(b.length+1).fill(0));
 for(let i=0;i<=a.length;i++)dp[i][0]=i;
 for(let j=0;j<=b.length;j++)dp[0][j]=j;
 for(let i=1;i<=a.length;i++)for(let j=1;j<=b.length;j++)
  dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
 return 1-dp[a.length][b.length]/Math.max(a.length,b.length);
}
function streetScore(street,text){
 const sw=normText(street).split(" ").filter(w=>w.length>2);
 const tw=normText(text).split(" ");
 if(!sw.length)return 0;
 let total=0;
 for(const w of sw){
   let best=0;
   for(const x of tw)best=Math.max(best,editSimilarity(w,x));
   if(best>=0.68)total+=best;
 }
 return total/sw.length;
}
function findAddressesInFullText(rawText){
 const t=normText(rawText),found=[];
 for(const p of allData){
   const ap=addressParts(p.Adresse); if(!ap.num)continue;
   const numberPattern=ap.num.replace(/([.*+?^${}()|[\]\\])/g,"\\$1").replace("bis","\\s*bis");
   const numberRx=new RegExp("(^|\\s)"+numberPattern+"(\\s|$)");
   if(!numberRx.test(t))continue;
   const score=streetScore(ap.street,t);
   if(score>=0.62)found.push({point:p,score});
 }
 return found.sort((a,b)=>b.score-a.score);
}
async function importPdaPhotos(files){
 if(!files||!files.length)return;
 ocrMatches=[];ocrRawTexts=[];
 document.getElementById("ocrModal").style.display="block";
 const status=document.getElementById("ocrStatus"),results=document.getElementById("ocrResults");
 results.innerHTML="";
 for(let i=0;i<files.length;i++){
   status.textContent=`Lecture photo ${i+1}/${files.length}...`;
   try{
     const r=await Tesseract.recognize(files[i],"fra",{logger:m=>{
       if(m.status==="recognizing text")status.textContent=`Photo ${i+1}/${files.length} — OCR ${Math.round((m.progress||0)*100)}%`;
     }});
     const raw=r.data.text||"";ocrRawTexts.push(raw);
     const matches=findAddressesInFullText(raw);
     for(const best of matches){
       const id=pointId(best.point);
       if(!ocrMatches.some(x=>x.id===id))ocrMatches.push({id,point:best.point,score:best.score});
     }
     results.innerHTML+=`<div class="ocr-row"><b>Photo ${i+1}</b> : ${matches.length} correspondance(s)<details><summary>Voir le texte OCR brut</summary><pre style="white-space:pre-wrap;font-size:11px">${raw.replace(/</g,"&lt;")}</pre></details></div>`;
   }catch(e){
     results.innerHTML+=`<div class="ocr-row ocr-bad">Erreur OCR photo ${i+1} : ${String(e.message||e)}</div>`;
   }
 }
 if(ocrMatches.length){
   results.innerHTML+=`<div class="ocr-row ocr-ok"><b>Adresses reconnues :</b></div>`+
   ocrMatches.map(m=>`<div class="ocr-row ocr-ok">✓ <b>${m.point.Adresse}</b> — Zone ${m.point.Zone}</div>`).join("");
   status.textContent=`OCR terminé : ${ocrMatches.length} adresse(s) reconnue(s). Vérifie puis valide.`;
 }else{
   const chars=ocrRawTexts.join("").trim().length;
   status.textContent=chars?`OCR réussi (${chars} caractères lus), mais aucune adresse du référentiel n'a été reconnue.`:"OCR illisible : aucun texte exploitable détecté.";
   results.innerHTML+=`<div class="ocr-row ocr-bad">${chars?"Le texte a bien été lu. Consulte le texte OCR brut ci-dessus pour diagnostiquer les différences avec zones.json.":"Aucun texte exploitable n'a été détecté sur les photos."}</div>`;
 }
 document.getElementById("pdaPhotos").value="";
}
function validateOcrImport(){
 for(const m of ocrMatches)selected[m.id]=true;
 save();updateStats();displayZone(document.getElementById("zoneSelect").value);closeOcr();
}
function closeOcr(){document.getElementById("ocrModal").style.display="none";}


function getMarkerColor(zone) {

    return zoneColors[zone] || "#333333";

}


function createMarker(point) {
 const id=pointId(point),isSelected=!!selected[id],isDone=!!delivered[id],color=isDone?"#777":getMarkerColor(point.Zone);
 const marker=L.circleMarker([point.Latitude,point.Longitude],{radius:isSelected?9:7,color,fillColor:color,fillOpacity:isDone?.25:.85,weight:isSelected?4:2});
 const codePorte=point.Code??point.code??point.CODE??"";
 let popup=`<b>Zone ${point.Zone}</b><br>${point.Adresse}`;
 if(String(codePorte).trim()) popup+=`<br><br><span class="code">🔑 ${codePorte}</span>`;
 if(!tourStarted) popup+=`<br><button class="done-btn" onclick='toggleSelected(${JSON.stringify(id)})'>${isSelected?"− Retirer de la tournée":"+ Ajouter à la tournée"}</button>`;
 else if(isSelected) popup+=`<br><button class="done-btn" onclick='toggleDelivered(${JSON.stringify(id)})'>${isDone?"↩ Remettre à livrer":"✓ Livré / Terminé"}</button>`;
 marker.bindPopup(popup);return marker;
}

function displayZone(zone) {

    markersLayer.clearLayers();


    let filteredData;


    if (zone === "all") {

        filteredData = tourStarted ? allData.filter(p=>selected[pointId(p)]&&!delivered[pointId(p)]) : allData;

    } else {

        filteredData = allData.filter(
            point => String(point.Zone) === String(zone) && (!tourStarted || (selected[pointId(point)] && !delivered[pointId(point)]))
        );

    }


    const bounds = [];


    filteredData.forEach(point => {

        if (
            point.Latitude !== null &&
            point.Longitude !== null
        ) {

            const marker = createMarker(point);

            marker.addTo(markersLayer);

            bounds.push([
                point.Latitude,
                point.Longitude
            ]);

        }

    });


    if (bounds.length > 0) {

        map.fitBounds(bounds, {
            padding: [30, 30]
        });

    }

}


fetch("zones.json?v=6", { cache: "no-store" })

    .then(response => response.json())

    .then(data => {

        allData = data; updateStats();


        const zones = [

            ...new Set(

                data.map(point => point.Zone)

            )

        ].sort(

            (a, b) => Number(a) - Number(b)

        );


        const select = document.getElementById("zoneSelect");


        zones.forEach(zone => {

            const option = document.createElement("option");

            option.value = zone;

            option.textContent = "Zone " + zone;

            select.appendChild(option);

        });


        select.addEventListener("change", function() {

            displayZone(this.value);

        });


        displayZone("all");

    })

    .catch(error => {

        console.error(error);

        alert("Impossible de charger zones.json");

    });


</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js")
      .then(() => console.log("Application hors ligne activée"))
      .catch(error => console.error("Erreur Service Worker", error));
  });
}
</script>
</body>
</html>
